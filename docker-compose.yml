services:
  fuzzer:
    build: 
      context: .
      network: host
    container_name: icu-ai-fuzzer
    environment:
      - ICU_HOME=/opt/icu-install
      - ICU_SRC=/opt/icu-src
      - ASAN_OPTIONS=abort_on_error=1:symbolize=1:detect_leaks=0

    # ── Security: allow GDB/ptrace inside container ──────────────
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined

    # ── Hardware protection: RAM-backed corpus I/O ───────────────
    # corpus만 tmpfs (SSD 보호) — crashes는 호스트에 영속 저장
    tmpfs:
      - /app/workspace/corpus:size=512m

    volumes:
      - ./scripts:/app/scripts
      - ./workspace:/app/workspace
      - ./dicts:/app/dicts:ro

    stdin_open: true
    tty: true
